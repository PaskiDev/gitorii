workflow:
  rules:
    # Stable: v1.2.3
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
    # Pre-release: v1.2.3-rc.1, v1.2.3-beta.2, v1.2.3-alpha.5
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+-[a-z]+\.[0-9]+$/
    - when: never

stages:
  - build
  - release

# Two CI pools (history below):
#
#   self-hosted (tag `gitorii`, runner `void-torii`)
#     · build-linux-x86_64    (native)
#     · build-linux-aarch64   (cross via aarch64-linux-gnu-gcc)
#     · build-windows-x86_64  (cross via mingw-w64 + nasm)
#     Saves ~15-20 min/release on the shared-runner quota.
#
#   shared (untagged, saas-linux-small-amd64)
#     · `release` job only (alpine + curl + jq, ~30 s).
#
# History: the first self-hosted attempt (May 20, ~4h debug) fought a
# rustc 1.94 / Arch / glibc combo that SIGSEGV'd compiling trivial
# crates (`libc`, `idna`) even with RUST_MIN_STACK at 16 MB. Root
# cause turned out to be the default pthread stack limit interacting
# with glibc's heuristics on the Arch kernel. Re-enabled 2026-05-25
# with `RUST_MIN_STACK=33554432` (32 MB) — the host validated all
# three targets build locally before we re-tagged the jobs.
#
# If the runner dies or the SIGSEGV ever returns: flip each build
# job's `extends: .build_linux_self` to `.build_linux` and CI returns
# to shared runners (Docker image with apt + cross-compile pkgs).

variables:
  # See e297db2 / docs: the deep generic tree pulled in by russh's
  # rsa-rc → sec1 chain overflows rustc's 8 MB default thread stack
  # during monomorphisation. 16 MB worked locally; the gitorii runner
  # host needs more (rustc SIGSEGV'd on `idna` mid-build of v0.7.8
  # and printed `help: RUST_MIN_STACK=33554432`). 32 MB matches the
  # compiler's own recommendation. Won't be needed once russh's
  # crypto chain drops the -rc suffix and stabilises generic depth.
  RUST_MIN_STACK: "33554432"
  # Local builds use `-j 2` as the OOM ceiling on this host (rustc at 16 MB
  # stack × N parallel jobs + codegen working set). The runner mirrors it.
  CARGO_BUILD_JOBS: "2"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/gitorii"
  # CARGO_HOME and RUSTUP_HOME are overridden inside `.build_linux`
  # to put cache under $CI_PROJECT_DIR/.cargo and .rustup — Docker
  # executor wipes the filesystem between jobs, but $CI_PROJECT_DIR
  # is what GitLab caches via the `cache:` key when configured.

# Docker-on-shared-runner template. Currently UNUSED — all three
# builds switched to .build_linux_self (self-hosted) on 2026-05-25.
# Kept here as the documented fallback: if the self-hosted runner dies
# or the rustc 1.94 + Arch host repros the SIGSEGV, flip each job's
# `extends:` back to `.build_linux` and CI returns to the shared pool
# (at the cost of 400 min/mo quota).
.build_linux:
  stage: build
  image: rust:1-bookworm
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
    RUSTUP_HOME: $CI_PROJECT_DIR/.rustup
  before_script:
    # gitlab.com shared runners use Docker executor — each job starts
    # from a fresh `rust:1-bookworm` image that already has cargo and
    # a recent stable rustc, but not the cross-compile toolchains or
    # the specific 1.94 toolchain pinned by rust-toolchain.toml. We
    # apt-install the cross-compile gcc(s) and let rustup-init lay
    # down the matching toolchain on top.
    - apt-get update -qq && apt-get install -y -qq curl build-essential $EXTRA_PKGS
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
    - export PATH="$CARGO_HOME/bin:$PATH"
    - rustup target add $TARGET
    - |
      if [ -n "$LINKER" ]; then
        mkdir -p .cargo
        printf '[target.%s]\nlinker = "%s"\n' "$TARGET" "$LINKER" >> .cargo/config.toml
      fi
  retry: 0
  script:
    - export PATH="$CARGO_HOME/bin:$PATH"
    - cargo build --release --target $TARGET
    - cp target/$TARGET/release/torii${EXT:-} torii-${ASSET_NAME}
  artifacts:
    paths:
      - torii-${ASSET_NAME}
    expire_in: 1 hour

# Self-hosted-runner template. Runs on the `void-torii` shell executor
# on the user's Arch host. Assumes the host already has:
#   · cargo + rustc (via rustup honouring rust-toolchain.toml = 1.94.0)
#   · gcc (native)
#   · aarch64-linux-gnu-gcc  (Arch pkg: aarch64-linux-gnu-gcc)
#   · x86_64-w64-mingw32-gcc (Arch pkg: mingw-w64-gcc)
#   · nasm                    (Arch pkg: nasm — only needed for windows)
#   · rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-gnu
.build_linux_self:
  stage: build
  tags: [gitorii]
  before_script:
    - which cargo || { echo "cargo missing on runner host. Install rust via rustup." ; exit 1; }
    - cargo --version
    - rustc --version
    # Configure cross-compile linker on-the-fly. Mirrors the Docker
    # template's behaviour so we don't need a host-wide .cargo/config.toml.
    - |
      if [ -n "$LINKER" ]; then
        mkdir -p .cargo
        printf '[target.%s]\nlinker = "%s"\n' "$TARGET" "$LINKER" >> .cargo/config.toml
      fi
  retry: 0
  script:
    - cargo build --release --target $TARGET
    - cp target/$TARGET/release/torii${EXT:-} torii-${ASSET_NAME}
  artifacts:
    paths:
      - torii-${ASSET_NAME}
    expire_in: 1 hour

# All three builds run on the self-hosted runner now that the host has
# the cross-compile toolchains installed (validated 2026-05-25). The
# shared-runner quota only pays for the tiny `release` job (~30s on
# alpine).
build-linux-x86_64:
  extends: .build_linux_self
  variables:
    TARGET: x86_64-unknown-linux-gnu
    ASSET_NAME: linux-x86_64

build-linux-aarch64:
  extends: .build_linux_self
  variables:
    TARGET: aarch64-unknown-linux-gnu
    ASSET_NAME: linux-aarch64
    LINKER: aarch64-linux-gnu-gcc

build-windows-x86_64:
  extends: .build_linux_self
  variables:
    TARGET: x86_64-pc-windows-gnu
    ASSET_NAME: windows-x86_64.exe
    LINKER: x86_64-w64-mingw32-gcc
    EXT: .exe
    # `aws-lc-sys` pulls NASM for x86 assembly optimisations when
    # building for Windows targets (its `nasm_builder.rs` panics with
    # "NASM command not found! Build cannot continue." otherwise). On
    # Linux/aarch64 it uses regular cc and doesn't need NASM. The host
    # must have `nasm` installed (Arch pkg: nasm).


release:
  stage: release
  retry: 0
  image: alpine:latest
  needs:
    - build-linux-x86_64
    - build-linux-aarch64
    - build-windows-x86_64
  dependencies:
    - build-linux-x86_64
    - build-linux-aarch64
    - build-windows-x86_64
  before_script:
    - apk add --no-cache curl jq
  script:
    - TAG="${CI_COMMIT_TAG}"
    - VER="${TAG#v}"
    - NOTES=$(awk "/^## \[${VER}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | sed '/^$/d')

    # Upload binaries to Generic Package Registry — URLs are permanent and predictable
    - |
      upload() {
        FILE="$1"
        NAME="$2"
        echo "Uploading $NAME..."
        HTTP=$(curl -s -o /tmp/up.json -w "%{http_code}" \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$FILE" \
          "${PACKAGE_REGISTRY_URL}/${TAG}/${NAME}")
        echo "  → $HTTP"
        if [ "$HTTP" != "201" ] && [ "$HTTP" != "200" ]; then
          cat /tmp/up.json
          echo "Upload failed: $HTTP" && exit 1
        fi
      }

    - upload torii-linux-x86_64     torii-linux-x86_64
    - upload torii-linux-aarch64    torii-linux-aarch64
    - upload torii-windows-x86_64.exe torii-windows-x86_64.exe

    # Create the release with links pointing to the package registry URLs
    - |
      BASE="${PACKAGE_REGISTRY_URL}/${TAG}"
      PAYLOAD=$(jq -n \
        --arg name "Gitorii ${TAG}" \
        --arg tag  "${TAG}" \
        --arg desc "${NOTES}" \
        --arg base "${CI_PROJECT_URL}" \
        --arg lx64  "${BASE}/torii-linux-x86_64" \
        --arg larm  "${BASE}/torii-linux-aarch64" \
        --arg win   "${BASE}/torii-windows-x86_64.exe" \
        '{
          name: $name,
          tag_name: $tag,
          description: $desc,
          assets: {
            links: [
              { name: "torii-linux-x86_64",        url: $lx64, link_type: "package" },
              { name: "torii-linux-aarch64",        url: $larm, link_type: "package" },
              { name: "torii-windows-x86_64.exe",   url: $win,  link_type: "package" },
              { name: "Install via cargo",           url: "https://crates.io/crates/gitorii", link_type: "other" },
              { name: "Changelog",                  url: "\($base)/-/blob/main/CHANGELOG.md", link_type: "other" }
            ]
          }
        }')

    - |
      HTTP=$(curl -s -o /tmp/release.json -w "%{http_code}" \
        --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$PAYLOAD" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")

      cat /tmp/release.json
      if [ "$HTTP" = "201" ]; then
        echo "✅ Release ${TAG} created."
      elif [ "$HTTP" = "409" ]; then
        echo "Release already exists — skipping."
      else
        echo "Unexpected status $HTTP" && exit 1
      fi
