workflow:
  rules:
    # Stable: v1.2.3
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
    # Pre-release: v1.2.3-rc.1, v1.2.3-beta.2, v1.2.3-alpha.5
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+-[a-z]+\.[0-9]+$/
    - when: never

stages:
  - build
  - release

# Self-hosted attempt (tag `gitorii`) was abandoned after ~4h fighting
# a rustc 1.94 / glibc / kernel interaction on the Arch host that
# SIGSEGVs even compiling trivial crates like `libc` and `idna` —
# unrelated to gitorii itself. Switched back to GitLab.com's shared
# runners (saas-linux-small-amd64): standard Linux env, well-tested
# for rust builds, the russh / rsa-rc / sec1 generic-tree stack
# pressure is covered by the project-level RUST_MIN_STACK CI/CD
# variable (set in UI to a value that the shared runner can satisfy
# — pthread can grow the worker-thread stack to whatever pthread_attr
# requests, no kernel cap fight). Free tier: 400 CI minutes/month,
# which covers ~10 releases of gitorii at current build times.
#
# Don't add a `tags:` here. Untagged jobs go to the shared runner
# pool; `saas-linux-small-amd64` is the default.

variables:
  # See e297db2 / docs: the deep generic tree pulled in by russh's
  # rsa-rc → sec1 chain overflows rustc's 8 MB default thread stack
  # during monomorphisation. 16 MB worked locally; the gitorii runner
  # host needs more (rustc SIGSEGV'd on `idna` mid-build of v0.7.8
  # and printed `help: RUST_MIN_STACK=33554432`). 32 MB matches the
  # compiler's own recommendation. Won't be needed once russh's
  # crypto chain drops the -rc suffix and stabilises generic depth.
  RUST_MIN_STACK: "33554432"
  # Local builds use `-j 2` as the OOM ceiling on this host (rustc at 16 MB
  # stack × N parallel jobs + codegen working set). The runner mirrors it.
  CARGO_BUILD_JOBS: "2"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/gitorii"
  # Persistent host cargo/rustup cache lives at ~/.cargo and ~/.rustup;
  # we used to override these to $CI_PROJECT_DIR/.cargo back when this
  # job ran in a fresh Docker container per build. With the shell-executor
  # runner that's just throwing away the host's existing cache, so we
  # leave the defaults alone.

.build_linux:
  stage: build
  before_script:
    # Shell executor on a host where rust+cargo+rustup+cross-toolchains
    # are pre-installed. The runner may not start a login shell, so
    # `~/.cargo/env` isn't auto-sourced for the job user — load it
    # explicitly when it exists. This is what makes `rustup target add`
    # below work without requiring the runner host to ship rustup in
    # /usr/local/bin. If the user account that runs jobs doesn't have
    # rustup at all, this is a no-op and the next line will fail with
    # a clear `rustup: command not found` (which is the right signal
    # to fix the runner's `user =` setting in /etc/gitlab-runner/config.toml).
    - "[ -f $HOME/.cargo/env ] && . $HOME/.cargo/env || true"
    - rustup target add $TARGET
    - |
      if [ -n "$LINKER" ]; then
        mkdir -p .cargo
        printf '[target.%s]\nlinker = "%s"\n' "$TARGET" "$LINKER" >> .cargo/config.toml
      fi
  retry: 0
  script:
    - cargo build --release --target $TARGET
    - cp target/$TARGET/release/torii${EXT:-} torii-${ASSET_NAME}
  # No `cache:` block — the shell-executor runner runs on a persistent
  # host so `~/.cargo/registry` (crate downloads) and the working
  # `target/` (incremental compile state) already survive across builds
  # without GitLab's cache layer. Adding `cache:` here required the
  # runner to declare a `[runners.cache]` backend in config.toml, which
  # ours doesn't, and the job failed at startup with
  # "cache factory not found". If we ever switch to ephemeral Docker
  # executors, re-add a cache block AND configure the backend.
  artifacts:
    paths:
      - torii-${ASSET_NAME}
    expire_in: 1 hour

build-linux-x86_64:
  extends: .build_linux
  variables:
    TARGET: x86_64-unknown-linux-gnu
    ASSET_NAME: linux-x86_64

build-linux-aarch64:
  extends: .build_linux
  variables:
    TARGET: aarch64-unknown-linux-gnu
    ASSET_NAME: linux-aarch64
    LINKER: aarch64-linux-gnu-gcc

build-windows-x86_64:
  extends: .build_linux
  variables:
    TARGET: x86_64-pc-windows-gnu
    ASSET_NAME: windows-x86_64.exe
    LINKER: x86_64-w64-mingw32-gcc
    EXT: .exe


release:
  stage: release
  retry: 0
  needs:
    - build-linux-x86_64
    - build-linux-aarch64
    - build-windows-x86_64
  dependencies:
    - build-linux-x86_64
    - build-linux-aarch64
    - build-windows-x86_64
  # `curl` and `jq` are expected on the runner host (the gitorii runner
  # is provisioned with both — see runner setup notes). No image / apt
  # / apk step needed under the shell executor.
  script:
    - TAG="${CI_COMMIT_TAG}"
    - VER="${TAG#v}"
    - NOTES=$(awk "/^## \[${VER}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | sed '/^$/d')

    # Upload binaries to Generic Package Registry — URLs are permanent and predictable
    - |
      upload() {
        FILE="$1"
        NAME="$2"
        echo "Uploading $NAME..."
        HTTP=$(curl -s -o /tmp/up.json -w "%{http_code}" \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$FILE" \
          "${PACKAGE_REGISTRY_URL}/${TAG}/${NAME}")
        echo "  → $HTTP"
        if [ "$HTTP" != "201" ] && [ "$HTTP" != "200" ]; then
          cat /tmp/up.json
          echo "Upload failed: $HTTP" && exit 1
        fi
      }

    - upload torii-linux-x86_64     torii-linux-x86_64
    - upload torii-linux-aarch64    torii-linux-aarch64
    - upload torii-windows-x86_64.exe torii-windows-x86_64.exe

    # Create the release with links pointing to the package registry URLs
    - |
      BASE="${PACKAGE_REGISTRY_URL}/${TAG}"
      PAYLOAD=$(jq -n \
        --arg name "Gitorii ${TAG}" \
        --arg tag  "${TAG}" \
        --arg desc "${NOTES}" \
        --arg base "${CI_PROJECT_URL}" \
        --arg lx64  "${BASE}/torii-linux-x86_64" \
        --arg larm  "${BASE}/torii-linux-aarch64" \
        --arg win   "${BASE}/torii-windows-x86_64.exe" \
        '{
          name: $name,
          tag_name: $tag,
          description: $desc,
          assets: {
            links: [
              { name: "torii-linux-x86_64",        url: $lx64, link_type: "package" },
              { name: "torii-linux-aarch64",        url: $larm, link_type: "package" },
              { name: "torii-windows-x86_64.exe",   url: $win,  link_type: "package" },
              { name: "Install via cargo",           url: "https://crates.io/crates/gitorii", link_type: "other" },
              { name: "Changelog",                  url: "\($base)/-/blob/main/CHANGELOG.md", link_type: "other" }
            ]
          }
        }')

    - |
      HTTP=$(curl -s -o /tmp/release.json -w "%{http_code}" \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$PAYLOAD" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")

      cat /tmp/release.json
      if [ "$HTTP" = "201" ]; then
        echo "✅ Release ${TAG} created."
      elif [ "$HTTP" = "409" ]; then
        echo "Release already exists — skipping."
      else
        echo "Unexpected status $HTTP" && exit 1
      fi
